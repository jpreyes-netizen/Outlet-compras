<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 1100" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <rect x="0" y="0" width="1200" height="70" fill="url(#hdr)"/>
  <text x="40" y="42" fill="#fff" font-size="22" font-weight="700">Flujograma Detallado 3: Depósito de Efectivo en Banco</text>
  <text x="40" y="62" fill="#9CA3AF" font-size="12">Tab "Depósitos y Abonos" → sub-tab Efectivo · Analista / Jefe / Admin</text>

  <!-- INICIO: cierre corroborado -->
  <g filter="url(#shadow)">
    <ellipse cx="450" cy="120" rx="120" ry="28" fill="#1e3a5f"/>
    <text x="450" y="118" text-anchor="middle" font-size="12" font-weight="700" fill="#fff">CIERRE CORROBORADO</text>
    <text x="450" y="133" text-anchor="middle" font-size="9" fill="#D1D5DB">trigger automático: línea pendiente</text>
  </g>
  <line x1="450" y1="148" x2="450" y2="175" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 1. Sistema generó línea auto -->
  <g filter="url(#shadow)">
    <rect x="270" y="180" width="360" height="65" rx="6" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="450" y="205" text-anchor="middle" font-size="12" font-weight="700" fill="#6B21A8">1. Sistema crea línea automática</text>
    <text x="450" y="223" text-anchor="middle" font-size="10" fill="#6B21A8">INSERT en depositos_efectivo con auto_generado=true</text>
    <text x="450" y="237" text-anchor="middle" font-size="10" fill="#6B21A8">monto_depositado = Σ(efectivo_corrob) del día×sucursal</text>
  </g>
  <line x1="450" y1="245" x2="450" y2="275" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 2. Analista abre tab -->
  <g filter="url(#shadow)">
    <rect x="300" y="280" width="300" height="55" rx="6" fill="#fff" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="450" y="305" text-anchor="middle" font-size="12" font-weight="600" fill="#111827">2. Analista abre Depósitos → Efectivo</text>
    <text x="450" y="323" text-anchor="middle" font-size="10" fill="#6B7280">Ve fila con monto y badge "Pendiente"</text>
  </g>
  <line x1="450" y1="335" x2="450" y2="360" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Click en fila pendiente -->
  <g filter="url(#shadow)">
    <rect x="300" y="365" width="300" height="55" rx="6" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="450" y="390" text-anchor="middle" font-size="12" font-weight="700" fill="#1E40AF">3. Click en fila → abre modal</text>
    <text x="450" y="408" text-anchor="middle" font-size="10" fill="#1E40AF">ModalDepositarEfectivo en modo "edit"</text>
  </g>
  <line x1="450" y1="420" x2="450" y2="450" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Modal muestra teórico + ya depositado + saldo -->
  <g filter="url(#shadow)">
    <rect x="200" y="455" width="500" height="100" rx="6" fill="#F0F9FF" stroke="#0EA5E9" stroke-width="1.5"/>
    <text x="450" y="478" text-anchor="middle" font-size="12" font-weight="700" fill="#0369A1">4. Modal calcula y muestra</text>
    <text x="220" y="498" font-size="10" fill="#0369A1">• Efectivo corroborado del día = Σ(efectivo_corrob) cierres corroborados</text>
    <text x="220" y="513" font-size="10" fill="#0369A1">• Ya depositado en otras líneas (depósitos confirmados previos)</text>
    <text x="220" y="528" font-size="10" fill="#0369A1">• Saldo pendiente = teórico − ya_depositado</text>
    <text x="220" y="546" font-size="10" font-weight="700" fill="#0369A1">→ Pre-rellena el campo "Monto depositado" con el saldo pendiente</text>
  </g>
  <line x1="450" y1="555" x2="450" y2="585" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Analista ingresa monto real -->
  <g filter="url(#shadow)">
    <rect x="270" y="590" width="360" height="80" rx="6" fill="#fff" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="450" y="615" text-anchor="middle" font-size="12" font-weight="700" fill="#111827">5. Ingresa monto realmente depositado</text>
    <text x="450" y="633" text-anchor="middle" font-size="10" fill="#6B7280">Si el banco recibió $498.500 y teórico era $500.000:</text>
    <text x="450" y="647" text-anchor="middle" font-size="10" fill="#6B7280">→ diferencia = -$1.500 (faltan monedas)</text>
    <text x="450" y="661" text-anchor="middle" font-size="10" fill="#6B7280">Sistema calcula diferencia en vivo</text>
  </g>
  <line x1="450" y1="670" x2="450" y2="700" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Decisión: hay diferencia? -->
  <g filter="url(#shadow)">
    <path d="M450,705 L580,750 L450,795 L320,750 z" fill="#FEF9C3" stroke="#D97706" stroke-width="1.5"/>
    <text x="450" y="744" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">¿Diferencia</text>
    <text x="450" y="759" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">≠ 0?</text>
  </g>

  <!-- NO -> sigue -->
  <line x1="320" y1="750" x2="180" y2="750" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="742" text-anchor="middle" font-size="11" font-weight="700" fill="#16A34A">NO</text>

  <!-- SI -> observación obligatoria -->
  <line x1="580" y1="750" x2="720" y2="750" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="650" y="742" text-anchor="middle" font-size="11" font-weight="700" fill="#DC2626">SÍ</text>

  <!-- Camino NO: observación opcional -->
  <g filter="url(#shadow)">
    <rect x="40" y="725" width="140" height="50" rx="6" fill="#fff" stroke="#9CA3AF" stroke-width="1.5"/>
    <text x="110" y="745" text-anchor="middle" font-size="11" fill="#374151">Observación</text>
    <text x="110" y="760" text-anchor="middle" font-size="11" fill="#374151" font-weight="700">opcional</text>
  </g>

  <!-- Camino SI: observación obligatoria -->
  <g filter="url(#shadow)">
    <rect x="720" y="720" width="220" height="65" rx="6" fill="#FEE2E2" stroke="#DC2626" stroke-width="1.5"/>
    <text x="830" y="745" text-anchor="middle" font-size="11" font-weight="700" fill="#7F1D1D">Observación OBLIGATORIA</text>
    <text x="830" y="762" text-anchor="middle" font-size="9" fill="#7F1D1D">"Faltan monedas $1.500"</text>
    <text x="830" y="775" text-anchor="middle" font-size="9" fill="#7F1D1D">u otra explicación</text>
  </g>

  <line x1="110" y1="775" x2="110" y2="820" stroke="#374151" stroke-width="1.5"/>
  <line x1="830" y1="785" x2="830" y2="820" stroke="#374151" stroke-width="1.5"/>

  <!-- 7. Sube comprobante (obligatorio) -->
  <g filter="url(#shadow)">
    <rect x="300" y="820" width="300" height="65" rx="6" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="450" y="845" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">7. Adjunta comprobante bancario</text>
    <text x="450" y="862" text-anchor="middle" font-size="10" fill="#92400E">OBLIGATORIO · PDF / JPG / PNG</text>
    <text x="450" y="876" text-anchor="middle" font-size="10" fill="#92400E">Sube a Supabase Storage</text>
  </g>
  <line x1="110" y1="820" x2="300" y2="820" stroke="#374151" stroke-width="1.5"/>
  <line x1="830" y1="820" x2="600" y2="820" stroke="#374151" stroke-width="1.5"/>
  <line x1="450" y1="885" x2="450" y2="915" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. Click Confirmar -->
  <g filter="url(#shadow)">
    <rect x="300" y="920" width="300" height="55" rx="6" fill="#DCFCE7" stroke="#16A34A" stroke-width="1.5"/>
    <text x="450" y="945" text-anchor="middle" font-size="12" font-weight="700" fill="#065F46">8. Click "Confirmar depósito"</text>
    <text x="450" y="963" text-anchor="middle" font-size="10" fill="#065F46">Sistema guarda y vincula</text>
  </g>
  <line x1="450" y1="975" x2="450" y2="1000" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 9. UPDATE depositos_efectivo -->
  <g filter="url(#shadow)">
    <rect x="280" y="1005" width="340" height="65" rx="6" fill="#1e3a5f" stroke="#1a2f4a" stroke-width="1.5"/>
    <text x="450" y="1030" text-anchor="middle" font-size="11" font-weight="700" fill="#fff">9. UPDATE en depositos_efectivo</text>
    <text x="450" y="1048" text-anchor="middle" font-size="9" fill="#D1D5DB">monto_depositado, observaciones, comprobante_url</text>
    <text x="450" y="1060" text-anchor="middle" font-size="9" fill="#D1D5DB">registrado_por (uid analista) · depositado_at</text>
  </g>

  <!-- BRANCH: depósito adicional -->
  <g transform="translate(700, 880)">
    <rect x="0" y="0" width="280" height="120" rx="8" fill="#FFFBEB" stroke="#F59E0B" stroke-width="1.5"/>
    <text x="140" y="20" text-anchor="middle" font-size="12" font-weight="700" fill="#92400E">¿Y si depositan en partes?</text>
    <text x="15" y="42" font-size="10" fill="#92400E">Ej: $500.000 en 2 depósitos ($300k + $200k)</text>
    <text x="15" y="60" font-size="10" fill="#92400E">1° depósito: completa la línea auto (UPDATE)</text>
    <text x="15" y="74" font-size="10" fill="#92400E">2° depósito: click "+ Registrar" → modo new</text>
    <text x="15" y="88" font-size="10" fill="#92400E">→ INSERT depositos_efectivo (auto_generado=false)</text>
    <text x="15" y="106" font-size="9" font-weight="700" fill="#7F1D1D">El total del día se calcula sumando filas</text>
  </g>

  <!-- LEYENDA derecha -->
  <g transform="translate(965, 180)">
    <rect x="0" y="0" width="220" height="660" fill="#fff" stroke="#E5E7EB" rx="8"/>
    <rect x="0" y="0" width="220" height="28" fill="#1e3a5f" rx="8"/>
    <text x="15" y="19" fill="#fff" font-size="12" font-weight="700">Modos del modal</text>

    <g transform="translate(15, 45)" font-size="10" fill="#374151">
      <text y="0" font-weight="700" fill="#1E40AF">modo: 'edit'</text>
      <text y="15">• Click en fila pendiente</text>
      <text y="28">• Click en fila confirmada (solo admin)</text>
      <text y="41">• UPDATE de la línea existente</text>

      <text y="65" font-weight="700" fill="#16A34A">modo: 'new'</text>
      <text y="80">• Click botón "+ Registrar"</text>
      <text y="93">• INSERT depósito adicional</text>
      <text y="106">• auto_generado = false</text>
    </g>

    <g transform="translate(0, 175)">
      <rect x="0" y="0" width="220" height="28" fill="#1e3a5f"/>
      <text x="15" y="19" fill="#fff" font-size="12" font-weight="700">Validaciones</text>
    </g>
    <g transform="translate(15, 220)" font-size="10" fill="#374151">
      <text y="0">• Sucursal obligatoria</text>
      <text y="14">• Fecha obligatoria</text>
      <text y="28">• Monto &gt; 0</text>
      <text y="42">• Comprobante adjunto</text>
      <text y="56">• Observación si dif ≠ 0</text>
    </g>

    <g transform="translate(0, 295)">
      <rect x="0" y="0" width="220" height="28" fill="#1e3a5f"/>
      <text x="15" y="19" fill="#fff" font-size="12" font-weight="700">Permisos</text>
    </g>
    <g transform="translate(15, 340)" font-size="10" fill="#374151">
      <text y="0" font-weight="700">Registrar/editar depósito:</text>
      <text y="14" font-family="Consolas, monospace" font-size="9">fin.teso.depositos = all</text>
      <text y="30">Roles permitidos:</text>
      <text y="44">• finanzas.admin</text>
      <text y="58">• finanzas.jefe_tienda</text>
      <text y="72">• finanzas.tesorero</text>

      <text y="98" font-weight="700">Revertir confirmado:</text>
      <text y="112">• Solo finanzas.admin</text>
    </g>

    <g transform="translate(0, 480)">
      <rect x="0" y="0" width="220" height="28" fill="#1e3a5f"/>
      <text x="15" y="19" fill="#fff" font-size="12" font-weight="700">Datos guardados</text>
    </g>
    <g transform="translate(15, 525)" font-size="9" fill="#374151" font-family="Consolas, monospace">
      <text y="0">fecha</text>
      <text y="14">sucursal_id</text>
      <text y="28">monto_depositado</text>
      <text y="42">observaciones</text>
      <text y="56">comprobante_url</text>
      <text y="70">comprobante_nombre</text>
      <text y="84">auto_generado</text>
      <text y="98">origen_cierres (uuid[])</text>
      <text y="112">registrado_por</text>
    </g>
  </g>

  <text x="40" y="1090" fill="#9CA3AF" font-size="10">Outlet de Puertas SpA · Manual Tesorería · Flujograma 3/3</text>
</svg>
