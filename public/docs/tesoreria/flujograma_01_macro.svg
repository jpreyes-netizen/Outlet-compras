<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" font-family="Arial, sans-serif">
  <defs>
    <linearGradient id="hdr" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M0,0 L10,5 L0,10 z" fill="#374151"/>
    </marker>
    <filter id="shadow"><feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.15"/></filter>
  </defs>

  <!-- Header -->
  <rect x="0" y="0" width="1400" height="70" fill="url(#hdr)"/>
  <text x="40" y="42" fill="#fff" font-size="22" font-weight="700">Outlet de Puertas SpA — Flujograma Macro: Módulo Tesorería</text>
  <text x="40" y="62" fill="#9CA3AF" font-size="12">Proceso end-to-end · Venta en POS → Conciliación bancaria</text>

  <!-- Swimlanes -->
  <g font-size="11" fill="#6B7280">
    <rect x="20" y="100" width="120" height="780" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="80" y="495" text-anchor="middle" font-weight="700" transform="rotate(-90, 80, 495)">CLIENTE / POS</text>

    <rect x="140" y="100" width="120" height="780" fill="#fff" stroke="#E5E7EB"/>
    <text x="200" y="495" text-anchor="middle" font-weight="700" transform="rotate(-90, 200, 495)">CAJERO</text>

    <rect x="260" y="100" width="120" height="780" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="320" y="495" text-anchor="middle" font-weight="700" transform="rotate(-90, 320, 495)">ADMIN / JEFE</text>

    <rect x="380" y="100" width="120" height="780" fill="#fff" stroke="#E5E7EB"/>
    <text x="440" y="495" text-anchor="middle" font-weight="700" transform="rotate(-90, 440, 495)">ANALISTA</text>

    <rect x="500" y="100" width="120" height="780" fill="#F9FAFB" stroke="#E5E7EB"/>
    <text x="560" y="495" text-anchor="middle" font-weight="700" transform="rotate(-90, 560, 495)">SISTEMA</text>
  </g>

  <!-- Header swimlanes -->
  <rect x="20" y="80" width="600" height="22" fill="#1e3a5f"/>
  <text x="80" y="96" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Cliente/POS</text>
  <text x="200" y="96" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Cajero</text>
  <text x="320" y="96" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Admin/Jefe</text>
  <text x="440" y="96" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Analista</text>
  <text x="560" y="96" fill="#fff" font-size="11" font-weight="600" text-anchor="middle">Sistema</text>

  <!-- ETAPAS (lado derecho) -->
  <g font-size="11" fill="#6B7280" font-weight="600">
    <text x="650" y="160">FASE 1</text>
    <text x="650" y="175" font-weight="400">Venta</text>

    <text x="650" y="280">FASE 2</text>
    <text x="650" y="295" font-weight="400">Declaración</text>

    <text x="650" y="430">FASE 3</text>
    <text x="650" y="445" font-weight="400">Corroboración</text>

    <text x="650" y="600">FASE 4</text>
    <text x="650" y="615" font-weight="400">Depósito bancario</text>

    <text x="650" y="770">FASE 5</text>
    <text x="650" y="785" font-weight="400">Conciliación</text>
  </g>

  <!-- 1. Cliente paga -->
  <g filter="url(#shadow)">
    <rect x="35" y="130" width="90" height="60" rx="8" fill="#EFF6FF" stroke="#3B82F6" stroke-width="1.5"/>
    <text x="80" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Cliente paga</text>
    <text x="80" y="170" text-anchor="middle" font-size="9" fill="#1E40AF">Efectivo /</text>
    <text x="80" y="182" text-anchor="middle" font-size="9" fill="#1E40AF">Getnet / WP</text>
  </g>

  <!-- 2. BSALE registra venta -->
  <g filter="url(#shadow)">
    <rect x="515" y="130" width="90" height="60" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="155" text-anchor="middle" font-size="11" font-weight="700" fill="#6B21A8">BSALE</text>
    <text x="560" y="170" text-anchor="middle" font-size="9" fill="#6B21A8">registra venta</text>
    <text x="560" y="182" text-anchor="middle" font-size="9" fill="#6B21A8">y recaudador</text>
  </g>
  <line x1="125" y1="160" x2="515" y2="160" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 3. Edge function sync -->
  <g filter="url(#shadow)">
    <rect x="515" y="220" width="90" height="55" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="243" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">Cache</text>
    <text x="560" y="257" text-anchor="middle" font-size="9" fill="#6B21A8">ventas_bsale</text>
    <text x="560" y="269" text-anchor="middle" font-size="9" fill="#6B21A8">_dia</text>
  </g>
  <line x1="560" y1="192" x2="560" y2="218" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 4. Cajero declara cierre -->
  <g filter="url(#shadow)">
    <rect x="155" y="310" width="90" height="70" rx="8" fill="#FEF3C7" stroke="#D97706" stroke-width="1.5"/>
    <text x="200" y="335" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">Declara</text>
    <text x="200" y="350" text-anchor="middle" font-size="11" font-weight="700" fill="#92400E">cierre</text>
    <text x="200" y="365" text-anchor="middle" font-size="9" fill="#92400E">por medio</text>
    <text x="200" y="376" text-anchor="middle" font-size="9" fill="#92400E">de pago</text>
  </g>
  <line x1="560" y1="277" x2="560" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="560" y1="300" x2="245" y2="300" stroke="#374151" stroke-width="1.5"/>
  <line x1="245" y1="300" x2="245" y2="310" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 5. Sistema guarda con estado declarado -->
  <g filter="url(#shadow)">
    <rect x="515" y="320" width="90" height="55" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="342" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">cierres_caja</text>
    <text x="560" y="357" text-anchor="middle" font-size="9" fill="#6B21A8">estado:</text>
    <text x="560" y="368" text-anchor="middle" font-size="9" font-weight="700" fill="#D97706">declarado</text>
  </g>
  <line x1="245" y1="345" x2="515" y2="345" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 6. Admin abre panel -->
  <g filter="url(#shadow)">
    <rect x="275" y="460" width="90" height="60" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="320" y="483" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Abre panel</text>
    <text x="320" y="498" text-anchor="middle" font-size="9" fill="#1E40AF">de</text>
    <text x="320" y="510" text-anchor="middle" font-size="9" fill="#1E40AF">corroboración</text>
  </g>
  <line x1="560" y1="375" x2="560" y2="450" stroke="#374151" stroke-width="1.5"/>
  <line x1="560" y1="450" x2="365" y2="450" stroke="#374151" stroke-width="1.5"/>
  <line x1="365" y1="450" x2="365" y2="460" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 7. Cuenta efectivo + edita medios -->
  <g filter="url(#shadow)">
    <rect x="275" y="540" width="90" height="60" rx="8" fill="#DBEAFE" stroke="#2563EB" stroke-width="1.5"/>
    <text x="320" y="563" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">Cuenta</text>
    <text x="320" y="578" text-anchor="middle" font-size="11" font-weight="700" fill="#1E40AF">efectivo</text>
    <text x="320" y="592" text-anchor="middle" font-size="9" fill="#1E40AF">+ confirma medios</text>
  </g>
  <line x1="320" y1="520" x2="320" y2="540" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 8. Sistema clasifica estado -->
  <g filter="url(#shadow)">
    <rect x="515" y="540" width="90" height="65" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="562" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">Clasifica:</text>
    <text x="560" y="577" text-anchor="middle" font-size="9" fill="#16A34A">cuadra</text>
    <text x="560" y="589" text-anchor="middle" font-size="9" fill="#D97706">tolerable</text>
    <text x="560" y="601" text-anchor="middle" font-size="9" fill="#DC2626">descuadre</text>
  </g>
  <line x1="365" y1="570" x2="515" y2="570" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 9. Auto-genera línea depositos_efectivo -->
  <g filter="url(#shadow)">
    <rect x="515" y="640" width="90" height="60" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="660" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">Línea auto</text>
    <text x="560" y="673" text-anchor="middle" font-size="9" fill="#6B21A8">depositos_</text>
    <text x="560" y="685" text-anchor="middle" font-size="9" fill="#6B21A8">efectivo</text>
    <text x="560" y="696" text-anchor="middle" font-size="9" fill="#6B21A8">(Pendiente)</text>
  </g>
  <line x1="560" y1="605" x2="560" y2="640" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 10. Analista deposita -->
  <g filter="url(#shadow)">
    <rect x="395" y="640" width="90" height="60" rx="8" fill="#D1FAE5" stroke="#059669" stroke-width="1.5"/>
    <text x="440" y="660" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">Confirma</text>
    <text x="440" y="675" text-anchor="middle" font-size="11" font-weight="700" fill="#065F46">depósito</text>
    <text x="440" y="690" text-anchor="middle" font-size="9" fill="#065F46">+ comprobante</text>
  </g>
  <line x1="515" y1="670" x2="485" y2="670" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 11. Sistema marca depositado -->
  <g filter="url(#shadow)">
    <rect x="515" y="740" width="90" height="55" rx="8" fill="#F3E8FF" stroke="#8B5CF6" stroke-width="1.5"/>
    <text x="560" y="762" text-anchor="middle" font-size="10" font-weight="700" fill="#6B21A8">Depósito</text>
    <text x="560" y="776" text-anchor="middle" font-size="9" font-weight="700" fill="#16A34A">CONFIRMADO</text>
    <text x="560" y="789" text-anchor="middle" font-size="9" fill="#6B21A8">con archivo</text>
  </g>
  <line x1="440" y1="700" x2="440" y2="725" stroke="#374151" stroke-width="1.5"/>
  <line x1="440" y1="725" x2="560" y2="725" stroke="#374151" stroke-width="1.5"/>
  <line x1="560" y1="725" x2="560" y2="740" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 12. Conciliación Cartola (sistema) -->
  <g filter="url(#shadow)">
    <rect x="515" y="820" width="90" height="50" rx="8" fill="#1e3a5f" stroke="#1a2f4a" stroke-width="1.5"/>
    <text x="560" y="842" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">Match con</text>
    <text x="560" y="856" text-anchor="middle" font-size="10" font-weight="700" fill="#fff">cartola</text>
  </g>
  <line x1="560" y1="795" x2="560" y2="820" stroke="#374151" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Leyenda -->
  <g transform="translate(800, 130)">
    <rect x="0" y="0" width="560" height="730" fill="#fff" stroke="#E5E7EB" rx="8"/>
    <rect x="0" y="0" width="560" height="30" fill="#1e3a5f" rx="8"/>
    <text x="20" y="20" fill="#fff" font-size="13" font-weight="700">Leyenda y reglas de negocio</text>

    <text x="20" y="55" font-size="11" font-weight="700" fill="#111827">Estados del cierre</text>
    <g transform="translate(20, 65)" font-size="10">
      <circle cx="6" cy="10" r="5" fill="#D97706"/>
      <text x="20" y="13" fill="#374151"><tspan font-weight="700">declarado</tspan> — Cajero firmó, pendiente corroborar</text>
      <circle cx="6" cy="30" r="5" fill="#16A34A"/>
      <text x="20" y="33" fill="#374151"><tspan font-weight="700">cuadra</tspan> — Diferencia ≤ umbral cuadra (default $1.000)</text>
      <circle cx="6" cy="50" r="5" fill="#F59E0B"/>
      <text x="20" y="53" fill="#374151"><tspan font-weight="700">tolerable</tspan> — Diferencia entre cuadra y tolerable ($50.000)</text>
      <circle cx="6" cy="70" r="5" fill="#DC2626"/>
      <text x="20" y="73" fill="#374151"><tspan font-weight="700">descuadre</tspan> — Sobre tolerable o falta efectivo</text>
      <circle cx="6" cy="90" r="5" fill="#9CA3AF"/>
      <text x="20" y="93" fill="#374151"><tspan font-weight="700">anulado</tspan> — Solo admin, queda excluido del cálculo</text>
    </g>

    <text x="20" y="180" font-size="11" font-weight="700" fill="#111827">Reglas críticas</text>
    <g transform="translate(20, 195)" font-size="10" fill="#374151">
      <text y="0">• Efectivo es exacto: cualquier diferencia genera registro en</text>
      <text y="14" font-weight="700" fill="#DC2626">descuadres_cobranza</text>
      <text y="32">• Si el efectivo declarado ≠ contado → estado = "descuadre"</text>
      <text y="50">• Medios electrónicos usan tolerancias normales (cuadra/tolerable)</text>
      <text y="68">• El cierre vincula con BSALE por <tspan font-weight="700">bsale_vendedor_id</tspan> primero,</text>
      <text y="82">  fallback por nombre normalizado</text>
      <text y="100">• Solo cierres corroborados (cuadra/tolerable/descuadre) generan</text>
      <text y="114">  la línea automática en <tspan font-weight="700">depositos_efectivo</tspan></text>
      <text y="132">• 1 línea auto-generada por día×sucursal sumando efectivo_corrob</text>
      <text y="150">• Múltiples depósitos por día se permiten (filas manuales)</text>
    </g>

    <text x="20" y="370" font-size="11" font-weight="700" fill="#111827">Roles y permisos</text>
    <g transform="translate(20, 385)" font-size="10" fill="#374151">
      <text y="0"><tspan font-weight="700">Cajero</tspan> (finanzas.cajero): declara sus propios cierres</text>
      <text y="18"><tspan font-weight="700">Jefe Tienda</tspan> (finanzas.jefe_tienda): corrobora y registra depósitos</text>
      <text y="36"><tspan font-weight="700">Tesorero</tspan> (finanzas.tesorero): corrobora, deposita, importa Getnet</text>
      <text y="54"><tspan font-weight="700">Admin</tspan> (finanzas.admin): todo + revertir cierres/depósitos confirmados</text>
    </g>

    <text x="20" y="470" font-size="11" font-weight="700" fill="#111827">Medios de pago manejados</text>
    <g transform="translate(20, 485)" font-size="10" fill="#374151">
      <text y="0">• Efectivo · T. Crédito · T. Débito · Webpay · Transferencia</text>
      <text y="18">• Mercado Pago · Abono Cliente · Canje · P. Clay · Cheque</text>
    </g>

    <text x="20" y="540" font-size="11" font-weight="700" fill="#111827">Tablas principales</text>
    <g transform="translate(20, 555)" font-size="10" fill="#374151" font-family="Consolas, monospace">
      <text y="0">cierres_caja · cierres_caja.{medio}_corrob</text>
      <text y="16">depositos_efectivo (auto + manuales)</text>
      <text y="32">abonos_getnet · abonos_webpay · abonos_transferencia</text>
      <text y="48">descuadres_cobranza (faltantes en efectivo)</text>
      <text y="64">ventas_bsale_dia (cache de BSALE)</text>
    </g>

    <text x="20" y="660" font-size="11" font-weight="700" fill="#111827">Vistas de consulta</text>
    <g transform="translate(20, 675)" font-size="10" fill="#374151" font-family="Consolas, monospace">
      <text y="0">v_recaudacion_diaria · v_cuadratura_mensual · v_cuadratura_anual</text>
    </g>
  </g>

  <!-- Footer -->
  <text x="40" y="890" fill="#9CA3AF" font-size="10">Outlet de Puertas SpA · Módulo Tesorería v1.0 · Manual de Operación</text>
</svg>
